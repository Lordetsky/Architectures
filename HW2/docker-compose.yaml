services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: marketplace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  flyway:
    image: flyway/flyway:11
    depends_on:
      db:
        condition: service_healthy
    command: -url=jdbc:postgresql://db:5432/marketplace -user=postgres -password=postgres -connectRetries=10 migrate
    volumes:
      - ./flyway/sql:/flyway/sql

  app:
    build: .
    depends_on:
      flyway:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/marketplace
      ORDER_RATE_LIMIT_MINUTES: "1"
    ports:
      - "8000:8000"

volumes:
  pgdata:
