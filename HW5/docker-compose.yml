
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,srvr"
    healthcheck:
      test: curl -f http://localhost:8080/commands/ruok || exit 1
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1
      interval: 15s
      timeout: 10s
      retries: 15

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
    healthcheck:
      test: curl -f http://localhost:8081/subjects || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    volumes:
      - ./schemas:/schemas
      - ./scripts:/scripts
    entrypoint: ["/bin/bash", "/scripts/init-kafka.sh"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081

  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8123:8123"
    volumes:
      - ./clickhouse/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: clickhouse-client --query "SELECT 1"
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: cinema_aggregates
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: pg_isready -U postgres
      interval: 10s
      timeout: 5s
      retries: 5

  producer:
    build: ./producer
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      GENERATOR_ENABLED: "true"
      GENERATOR_INTERVAL_SEC: "2"
      GENERATOR_NUM_USERS: "20"
      GENERATOR_NUM_MOVIES: "10"
      BACKFILL_DAYS: "10"

  aggregator:
    build: ./aggregator
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8001:8001"
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_DB: cinema
      POSTGRES_DSN: postgresql://postgres:postgres@postgres:5432/cinema_aggregates
      SCHEDULE_INTERVAL_SEC: "60"

  test:
    profiles: ["test"]
    build: ./tests
    depends_on:
      producer:
        condition: service_started
      clickhouse:
        condition: service_healthy
    environment:
      PRODUCER_URL: http://producer:8000
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_DB: cinema
